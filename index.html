<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="ToStudy – Öğrenci portalı: Yapılacaklar, Sınav Planlama, Odaklanma Sayacı, AGNO Hesaplama ve Dijital Ajanda.">
    <title>ToStudy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- ─── Main Container ─── -->
    <div id="app">
        <!-- ─── Brand ─── -->
        <header id="brand">
            <h1>ToStudy</h1>
            <p class="subtitle">Akıllı Öğrenci Portalı</p>
        </header>

        <!-- ─── Navigation Icons ─── -->
        <nav id="nav-bar">
            <button class="nav-btn" data-module="todo" title="Yapılacaklar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M9 11l3 3L22 4" />
                    <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
                </svg>
                <span>Yapılacaklar</span>
            </button>
            <button class="nav-btn" data-module="exam" title="Sınav Planlayıcı">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                    <line x1="16" y1="2" x2="16" y2="6" />
                    <line x1="8" y1="2" x2="8" y2="6" />
                    <line x1="3" y1="10" x2="21" y2="10" />
                    <line x1="10" y1="14" x2="14" y2="14" />
                    <line x1="12" y1="12" x2="12" y2="16" />
                </svg>
                <span>Sınav Planlayıcı</span>
            </button>
            <button class="nav-btn" data-module="timer" title="Odaklanma Sayacı">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
                <span>Odaklanma</span>
            </button>
            <button class="nav-btn" data-module="agno" title="AGNO Hesaplayıcı">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect x="4" y="2" width="16" height="20" rx="2" />
                    <line x1="8" y1="6" x2="16" y2="6" />
                    <line x1="8" y1="10" x2="16" y2="10" />
                    <line x1="8" y1="14" x2="12" y2="14" />
                    <circle cx="14" cy="18" r="1.5" />
                </svg>
                <span>AGNO</span>
            </button>
            <button class="nav-btn" data-module="agenda" title="Dijital Ajanda">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
                    <line x1="12" y1="11" x2="12" y2="17" />
                    <line x1="9" y1="14" x2="15" y2="14" />
                </svg>
                <span>Dijital Ajanda</span>
            </button>
        </nav>
    </div>

    <!-- ─── Modal Overlay ─── -->
    <div id="modal-overlay">
        <div id="modal-panel">
            <button id="modal-close">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- ─── Scripts ─── -->
    <script src="js/app.js"></script>
    <script src="js/todo.js"></script>
    <script src="js/exam.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/agno.js"></script>
    <script src="js/agenda.js"></script>
</body>

</html>
